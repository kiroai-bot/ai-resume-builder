<!DOCTYPE html>
<html>

<head>

<title>Create Resume</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h2>Create Resume</h2>

</header>

<div class="container">

<div class="card">

<input id="name" placeholder="Full Name">

<input id="role" placeholder="Job Role">

<textarea id="skills" placeholder="Skills"></textarea>

<textarea id="experience" placeholder="Experience"></textarea>

<button onclick="aiWrite()">AI Write</button>

<button onclick="generateResume()">Generate Resume</button>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="resumeOutput" class="card resume"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="js/app.js"></script>

</body>

</html>
