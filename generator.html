<!DOCTYPE html>
<html>
<head>

<title>Create Resume</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>
<h2>Generate Your Resume</h2>
</header>

<div class="container">

<input id="name" placeholder="Full Name">

<input id="role" placeholder="Job Role">

<textarea id="skills" placeholder="Skills"></textarea>

<textarea id="experience" placeholder="Experience"></textarea>

<button onclick="aiWrite()">AI Write Resume</button>

<button onclick="generateResume()">Generate Resume</button>

<button onclick="downloadPDF()">Download PDF</button>

<div id="resumeOutput" class="resume-box"></div>

</div>

<script src="js/ai.js"></script>
<script src="js/generator.js"></script>
<script src="js/download.js"></script>

</body>
</html>
